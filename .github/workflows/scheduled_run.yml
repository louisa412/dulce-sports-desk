name: Dulce Sports Desk Daily Push

on:
  schedule:
    # 台北時間 08:00 (Asia/Taipei = UTC+8 -> UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式：test=測試推播, broadcast=正式廣播"
        required: true
        default: test
        type: choice
        options:
          - test
          - broadcast

jobs:
  run-sports-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Debug Trigger Context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule_expr=${{ github.event.schedule }}"
          echo "run_id=${{ github.run_id }}"
          echo "triggered_utc=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "triggered_taipei=$(TZ=Asia/Taipei date '+%Y-%m-%dT%H:%M:%S%z')"

      - name: Run Main Script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 可在 GitHub Secrets 新增 GEMINI_MODEL 覆寫；預設用 gemini-2.5-flash-lite
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run -> broadcast mode"
            python main.py
          elif [ "${{ github.event.inputs.mode }}" = "broadcast" ]; then
            echo "Manual run -> broadcast mode"
            python main.py
          else
            echo "Manual run -> test mode"
            python main.py test
          fi
